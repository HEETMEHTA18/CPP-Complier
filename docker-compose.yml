services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: coderunner
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  api1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=development
      - DB_HOST=pgbouncer
      - DB_PORT=5432
      - DB_NAME=coderunner
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
    depends_on:
      pgbouncer:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_started

  api2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=development
      - DB_HOST=pgbouncer
      - DB_PORT=5432
      - DB_NAME=coderunner
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
    depends_on:
      pgbouncer:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_started

  load_balancer:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api1
      - api2

  worker1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: npm run worker
    environment:
      - NODE_ENV=development
      - DB_HOST=pgbouncer
      - DB_PORT=5432
      - DB_NAME=coderunner
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - WORKER_CONCURRENCY=2
    depends_on:
      pgbouncer:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: npm run worker
    environment:
      - NODE_ENV=development
      - DB_HOST=pgbouncer
      - DB_PORT=5432
      - DB_NAME=coderunner
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - WORKER_CONCURRENCY=2
    depends_on:
      pgbouncer:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_started

  pgbouncer:
    image: edoburu/pgbouncer
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 2000
      DEFAULT_POOL_SIZE: 200
    ports:
      - "5434:5432"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - load_balancer

volumes:
  postgres_data:
